<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav></nav>
        <div class="wrapper">
            <h1>Number Guessing Game</h1>
            <h3>Try and guess a random number between 1 to 100</h3>
            <h3>You have 10 attempts to guess the right number</h3>
            <br>
            <div class="main-container">
                <form>
                    <label for="guessNumber">Guess a Number</label>
                    <input type="text" id="guessField" class="guessField">
                    <input type="submit" id="subt" value="submit Guess " class="guessSubmit">

                </form>

                <div class="resultparas">
                    <p class="guesses">Previous Guesses: <span></span></p>
                    <p>Remainning Guesses: <span class="lastResult">10</span></p>
                    <p class="lowOrHi"></p>
                </div>
            </div>
            
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
